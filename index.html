<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              crm: {
                primary: '#1558d6', // Zoho Primary Blue
                primaryDark: '#11192e', // Zoho Sidebar Navy
                primaryLight: '#377dff',
                primaryLighter: '#f0f5ff',
                sidebarText: '#d1d5db',
                bg: '#f8f9fa',
                cardBg: '#ffffff',
                textDark: '#1e293b',
                textMuted: '#64748b',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth custom animations */
      @keyframes running-border {
        0% { border-color: #1558d6; box-shadow: 0 0 0 2px rgba(21, 88, 214, 0.2); }
        50% { border-color: #377dff; box-shadow: 0 0 0 4px rgba(21, 88, 214, 0.4); }
        100% { border-color: #1558d6; box-shadow: 0 0 0 2px rgba(21, 88, 214, 0.2); }
      }
      
      .btn-running-border {
        position: relative;
        overflow: hidden;
        border: 1px solid #1558d6 !important;
        background: #1558d6 !important;
        color: #FFFFFF !important;
        transition: all 0.2s ease;
      }
      .btn-running-border:hover {
        background: #0f44ad !important;
        border-color: #0f44ad !important;
      }
      
      /* Sidebar hover animations */
      .sidebar-item {
        position: relative;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .sidebar-item::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: 0;
        top: 0;
        width: 0;
        background-color: #FFFFFF;
        transition: all 0.3s ease;
        opacity: 0;
      }
      .sidebar-item:hover::after {
        width: 4px;
        opacity: 1;
      }
      
      /* Smooth fade for tabs */
      .tab-content {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Hide scrollbars but keep functionality */
      .scrollbar-none::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-none {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Global inputs & select styling (Premium Black & White Theme) */
      .crm-input {
        background-color: #FFFFFF !important;
        border: 1px solid #cbd5e1 !important;
        color: #1e293b !important;
        transition: all 0.2s ease;
        border-radius: 4px !important;
      }
      .crm-input::placeholder {
        color: #94a3b8 !important;
      }
      .crm-input:focus {
        border-color: #1558d6 !important;
        box-shadow: 0 0 0 1px #1558d6 !important;
        outline: none !important;
      }
      
      /* Zoho classic red line for required fields */
      .crm-input[required] {
        /* border-left: 3px solid #ef4444 !important; */
      }

    </style>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
