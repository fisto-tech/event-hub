<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Open Sans"', 'sans-serif'],
            },
            colors: {
              crm: {
                primary: '#00b5e2', // New Cyan Primary
                primaryDark: '#00a0c9', // New Cyan Dark Hover
                primaryLight: '#33c4e8',
                primaryLighter: '#e0f8fc',
                sidebarText: '#d1d5db',
                bg: '#f8f9fa',
                cardBg: '#ffffff',
                textDark: '#1e293b',
                textMuted: '#64748b',
                sidebarBg: '#151A2D',
                sidebarActiveParent: '#242B42',
                sidebarActiveSub: '#616A83',
                sidebarLogout: '#00AEEF',
              }
            },
            textColor: {
              crm: {
                primary: '#008ba3', // Darker Cyan for better text readability
                primaryDark: '#006d80',
              }
            }
          }
        }
      }
    </script>
    <style>
      html, body, #root,
      button, input, select, textarea, optgroup {
        font-family: 'Open Sans', sans-serif;
      }

      /* Smooth custom animations */
      @keyframes running-border {
        0% { border-color: #00b5e2; box-shadow: 0 0 0 2px rgba(0, 181, 226, 0.2); }
        50% { border-color: #33c4e8; box-shadow: 0 0 0 4px rgba(0, 181, 226, 0.4); }
        100% { border-color: #00b5e2; box-shadow: 0 0 0 2px rgba(0, 181, 226, 0.2); }
      }
      
      .btn-running-border {
        position: relative;
        overflow: hidden;
        border: 1px solid #00b5e2 !important;
        background: #00b5e2 !important;
        color: #FFFFFF !important;
        transition: all 0.2s ease;
      }
      .btn-running-border:hover {
        background: #0f44ad !important;
        border-color: #0f44ad !important;
      }
      
      /* Sidebar hover animations */
      .sidebar-item {
        position: relative;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .sidebar-item::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: 0;
        top: 0;
        width: 0;
        background-color: #FFFFFF;
        transition: all 0.3s ease;
        opacity: 0;
      }
      .sidebar-item:hover::after {
        width: 4px;
        opacity: 1;
      }
      
      /* Smooth fade for tabs */
      .tab-content {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Hide scrollbars but keep functionality */
      .scrollbar-none::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-none {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Global inputs & select styling (Premium Black & White Theme) */
      .crm-input {
        background-color: #FFFFFF !important;
        border: 1px solid #cbd5e1 !important;
        color: #1e293b !important;
        transition: all 0.2s ease;
        border-radius: 4px !important;
      }
      .crm-input::placeholder {
        color: #94a3b8 !important;
      }
      .crm-input:focus {
        border-color: #00b5e2 !important;
        box-shadow: 0 0 0 1px #00b5e2 !important;
        outline: none !important;
      }
      
      /* Global Custom Scrollbar for Cyan Theme */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #00b5e2;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00a0c9;
      }
      
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #00b5e2;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #00a0c9;
      }
      
      /* Zoho classic red line for required fields */
      .crm-input[required] {
        /* border-left: 3px solid #ef4444 !important; */
      }

    </style>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
